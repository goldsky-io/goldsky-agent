# Multi-Event Activity Feed
# Decodes multiple EVM events from raw logs into a unified activity table.
# Pattern: raw_logs → decode → per-event transforms → UNION ALL → sink
#
# This example tracks ERC-20 Transfer and Approval events on Base USDC.
# Adapt the ABI, addresses, and column mappings for your use case.

name: example-activity-feed
resource_size: s

sources:
  raw_logs:
    type: dataset
    dataset_name: base.logs
    version: 1.0.0
    start_at: latest
    # Pre-filter at the source for efficiency
    filter: >-
      address = '0x833589fcd6edb6e08f4c7c32d4f71b54bda02913'

transforms:
  # Step 1: Decode raw logs using the contract ABI
  decoded_events:
    type: sql
    primary_key: id
    sql: |
      SELECT
        _gs_log_decode(
          '[{"anonymous":false,"inputs":[{"indexed":true,"name":"from","type":"address"},{"indexed":true,"name":"to","type":"address"},{"indexed":false,"name":"value","type":"uint256"}],"name":"Transfer","type":"event"},{"anonymous":false,"inputs":[{"indexed":true,"name":"owner","type":"address"},{"indexed":true,"name":"spender","type":"address"},{"indexed":false,"name":"value","type":"uint256"}],"name":"Approval","type":"event"}]',
          topics,
          data
        ) AS decoded,
        id,
        block_number,
        transaction_hash,
        address,
        block_timestamp
      FROM raw_logs

  # Step 2a: Extract Transfer events
  transfers:
    type: sql
    primary_key: id
    sql: |
      SELECT
        id,
        block_number,
        block_timestamp,
        transaction_hash,
        address AS contract_address,
        decoded.event_params[1] AS from_address,
        decoded.event_params[2] AS to_address,
        (CAST(decoded.event_params[3] AS DOUBLE) / 1e6) AS amount,
        'TRANSFER' AS event_type
      FROM decoded_events
      WHERE decoded.event_signature = 'Transfer'

  # Step 2b: Extract Approval events (same output schema as transfers)
  approvals:
    type: sql
    primary_key: id
    sql: |
      SELECT
        id,
        block_number,
        block_timestamp,
        transaction_hash,
        address AS contract_address,
        decoded.event_params[1] AS from_address,
        decoded.event_params[2] AS to_address,
        (CAST(decoded.event_params[3] AS DOUBLE) / 1e6) AS amount,
        'APPROVAL' AS event_type
      FROM decoded_events
      WHERE decoded.event_signature = 'Approval'

  # Step 3: Combine into a single stream
  all_activities:
    type: sql
    primary_key: id
    sql: |
      SELECT * FROM transfers
      UNION ALL
      SELECT * FROM approvals

sinks:
  output:
    type: blackhole
    from: all_activities
    # Replace with a real sink for production:
    # type: postgres
    # table: activities
    # schema: public
    # secret_name: MY_POSTGRES_SECRET
    # primary_key: id
